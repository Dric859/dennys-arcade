    #gameOver h1 { font-size: 52px; color: #ff0000; margin-bottom: 16px; letter-spacing: 6px; text-shadow: 0 0 20px #ff0000; }

<body>

<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const levelEl = document.getElementById("level");
const finalScoreEl = document.getElementById("finalScore");
const gameOverEl = document.getElementById("gameOver");
const hudLeftEl = document.getElementById("hudLeft");
const hudTopEl = document.getElementById("hudTop");
const controlsEl = document.getElementById("controls");
const countdownEl = document.getElementById("countdown");
const hiScoreDisplay = document.getElementById("hiScoreDisplay");
const hiScoreMsgEl = document.getElementById("hiScoreMsg");

let score = 0, level = 1, playerLives = 5;
let gameRunning = false, gameState = "start";
let enemySpawnRate = 1200, hiScore = 0, animFrameId = null, ufoSpawnTimer = 0;
const UFO_SPAWN_INTERVAL = 420;
const keys = {};
var audioCtx = null;
var soundEnabled = true;

// ── Chiptune Background Music Engine ─────────────────────────
var musicPlaying = false;
var masterGain = null;
var MUSIC_VOLUME = 0.07;

// Milestone lives tracking
const LIFE_MILESTONES = [1000, 5000, 10000];
let milestoneAwarded = [];

function checkLifeMilestones() {
    LIFE_MILESTONES.forEach(ms => {
        if (score >= ms && !milestoneAwarded.includes(ms)) {
            milestoneAwarded.push(ms);
            playerLives++;
            updateUI();
            showBonusLife(ms);
            playSound('bonusLife');
        }
    });
}

function showBonusLife(pts) {
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);
        font-family:'Courier New',monospace;font-size:28px;font-weight:bold;color:#00ff88;
        text-shadow:0 0 20px #00ff88;pointer-events:none;z-index:200;text-align:center;
        animation:floatUp 2s ease-out forwards;letter-spacing:3px;`;
    el.innerHTML = '+ BONUS LIFE!<br><span style="font-size:14px;color:#ffcc00;">'+pts.toLocaleString()+' PTS</span>';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
}

function getAudioCtx() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // Resume if suspended (browser autoplay policy)
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

function toggleMute() {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('muteBtn');
    btn.innerText = soundEnabled ? '🔊 SOUND' : '🔇 MUTED';
    if (masterGain && audioCtx && audioCtx.state !== 'closed') {
        masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
        masterGain.gain.setValueAtTime(soundEnabled ? MUSIC_VOLUME : 0, audioCtx.currentTime);
    }
    if (soundEnabled && gameState === 'playing' && !musicPlaying) startMusic();
}

// ── Sound effects ─────────────────────────────────────────────
function playSound(type) {
    if (!soundEnabled) return;
    try {
        const ac = getAudioCtx();
        const now = ac.currentTime;
        // Each sound gets its own mini gain so it doesn't fight the master
        const out = ac.createGain();
        out.connect(ac.destination);
        switch(type) {
            case 'shoot': {
                const osc = ac.createOscillator();
                const g = ac.createGain();
                osc.connect(g); g.connect(out);
                osc.type = 'square';
                osc.frequency.setValueAtTime(720, now);
                osc.frequency.exponentialRampToValueAtTime(180, now+0.07);
                g.gain.setValueAtTime(0.15, now);
                g.gain.exponentialRampToValueAtTime(0.001, now+0.08);
                osc.start(now); osc.stop(now+0.09);
                break;
            }
            case 'asteroidExplode': {
                const buf = ac.createBuffer(1, ac.sampleRate*0.25, ac.sampleRate);
                const d = buf.getChannelData(0);
                for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.2);
                const src = ac.createBufferSource();
                const filt = ac.createBiquadFilter();
                const g = ac.createGain();
                filt.type='lowpass'; filt.frequency.value=700;
                src.buffer=buf; src.connect(filt); filt.connect(g); g.connect(out);
                g.gain.setValueAtTime(0.4,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
                src.start(now);
                break;
            }
            case 'ufoExplode': {
                const osc = ac.createOscillator();
                const g = ac.createGain();
                osc.connect(g); g.connect(out);
                osc.type='sawtooth';
                osc.frequency.setValueAtTime(500,now);
                osc.frequency.exponentialRampToValueAtTime(60,now+0.35);
                g.gain.setValueAtTime(0.25,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
                osc.start(now); osc.stop(now+0.36);
                break;
            }
            case 'ufoShoot': {
                const osc = ac.createOscillator();
                const g = ac.createGain();
                osc.connect(g); g.connect(out);
                osc.type='sawtooth';
                osc.frequency.setValueAtTime(380,now);
                osc.frequency.exponentialRampToValueAtTime(95,now+0.1);
                g.gain.setValueAtTime(0.1,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.1);
                osc.start(now); osc.stop(now+0.11);
                break;
            }
            case 'playerExplode': {
                const buf = ac.createBuffer(1, ac.sampleRate*0.7, ac.sampleRate);
                const d = buf.getChannelData(0);
                for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.5);
                const src = ac.createBufferSource();
                const filt = ac.createBiquadFilter();
                const g = ac.createGain();
                filt.type='lowpass'; filt.frequency.value=350;
                src.buffer=buf; src.connect(filt); filt.connect(g); g.connect(out);
                g.gain.setValueAtTime(0.8,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.7);
                src.start(now);
                const osc=ac.createOscillator(), og=ac.createGain();
                osc.connect(og); og.connect(out);
                osc.type='sine'; osc.frequency.setValueAtTime(75,now);
                osc.frequency.exponentialRampToValueAtTime(28,now+0.4);
                og.gain.setValueAtTime(0.45,now); og.gain.exponentialRampToValueAtTime(0.001,now+0.4);
                osc.start(now); osc.stop(now+0.41);
                break;
            }
            case 'levelUp': {
                [523,659,784,1047].forEach((freq,i) => {
                    const osc=ac.createOscillator(), g=ac.createGain();
                    osc.connect(g); g.connect(out);
                    osc.type='square';
                    osc.frequency.setValueAtTime(freq, now+i*0.1);
                    g.gain.setValueAtTime(0,now+i*0.1);
                    g.gain.linearRampToValueAtTime(0.12,now+i*0.1+0.02);
                    g.gain.exponentialRampToValueAtTime(0.001,now+i*0.1+0.12);
                    osc.start(now+i*0.1); osc.stop(now+i*0.1+0.14);
                });
                break;
            }
            case 'bonusLife': {
                [523,659,784,1047,1319].forEach((freq,i) => {
                    const osc=ac.createOscillator(), g=ac.createGain();
                    osc.connect(g); g.connect(out);
                    osc.type='triangle';
                    osc.frequency.setValueAtTime(freq, now+i*0.09);
                    g.gain.setValueAtTime(0,now+i*0.09);
                    g.gain.linearRampToValueAtTime(0.18,now+i*0.09+0.02);
                    g.gain.exponentialRampToValueAtTime(0.001,now+i*0.09+0.15);
                    osc.start(now+i*0.09); osc.stop(now+i*0.09+0.17);
                });
                break;
            }
        }
    } catch(e) {}
}

// ── Chiptune Music Engine (robust — pre-scheduled) ────────────
const SCALE = [130.81,155.56,174.61,196.00,233.08,
               261.63,311.13,349.23,392.00,466.16,
               523.25,622.25];
const MELODY =     [0,2,4,5,4,2,0, 2,4,7,9,7,4,2, 0,4,5,7,5,4,0, 2,5,7,9,7,5,2];
const MELODY_DUR = [.18,.18,.18,.18,.18,.18,.36, .18,.18,.18,.18,.18,.18,.36,
                    .18,.18,.18,.18,.18,.18,.36, .18,.18,.18,.18,.18,.18,.5];
const BASS =     [0,0,2,0, 0,2,4,2, 0,0,2,4, 2,0,4,0];
const BASS_DUR = [.25,.25,.25,.25, .25,.25,.25,.25, .25,.25,.25,.25, .25,.25,.25,.5];

var melodyIdx=0, bassIdx=0, arpIdx=0;
var melodyTimer=null, bassTimer=null, arpTimer=null, pulseTimer=null;

function startMusic() {
    if (musicPlaying) return;
    const ac = getAudioCtx();
    if (!masterGain) {
        masterGain = ac.createGain();
        masterGain.connect(ac.destination);
    }
    masterGain.gain.cancelScheduledValues(ac.currentTime);
    masterGain.gain.setValueAtTime(0, ac.currentTime);
    masterGain.gain.linearRampToValueAtTime(soundEnabled ? MUSIC_VOLUME : 0, ac.currentTime+2.0);
    musicPlaying = true;
    melodyIdx=0; bassIdx=0; arpIdx=0;
    playMelodyNote();
    playBassNote();
    playArpNote();
    playPulse();
}

function stopMusic() {
    if (!musicPlaying) return;
    musicPlaying = false;
    clearTimeout(melodyTimer);
    clearTimeout(bassTimer);
    clearTimeout(arpTimer);
    clearTimeout(pulseTimer);
    if (masterGain && audioCtx) {
        masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
        masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
        masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+1.2);
    }
}

function playMelodyNote() {
    if (!musicPlaying || !masterGain) return;
    try {
        const ac = getAudioCtx();
        const idx = melodyIdx % MELODY.length;
        const freq = SCALE[MELODY[idx]] * 2;
        const dur = MELODY_DUR[idx];
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.connect(g); g.connect(masterGain);
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, ac.currentTime);
        g.gain.setValueAtTime(0.5, ac.currentTime);
        g.gain.setValueAtTime(0.5, ac.currentTime+dur*0.55);
        g.gain.linearRampToValueAtTime(0, ac.currentTime+dur*0.92);
        osc.start(ac.currentTime); osc.stop(ac.currentTime+dur);
        melodyIdx++;
        melodyTimer = setTimeout(playMelodyNote, dur*1000 - 10);
    } catch(e) { melodyTimer = setTimeout(playMelodyNote, 200); }
}

function playBassNote() {
    if (!musicPlaying || !masterGain) return;
    try {
        const ac = getAudioCtx();
        const idx = bassIdx % BASS.length;
        const freq = SCALE[BASS[idx]] * 0.5;
        const dur = BASS_DUR[idx];
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.connect(g); g.connect(masterGain);
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, ac.currentTime);
        g.gain.setValueAtTime(0.6, ac.currentTime);
        g.gain.setValueAtTime(0.6, ac.currentTime+dur*0.6);
        g.gain.linearRampToValueAtTime(0, ac.currentTime+dur*0.92);
        osc.start(ac.currentTime); osc.stop(ac.currentTime+dur);
        bassIdx++;
        bassTimer = setTimeout(playBassNote, dur*1000 - 10);
    } catch(e) { bassTimer = setTimeout(playBassNote, 200); }
}

function playArpNote() {
    if (!musicPlaying || !masterGain) return;
    try {
        const ac = getAudioCtx();
        const arpNotes = [SCALE[4]*2, SCALE[7]*2, SCALE[9]*2, SCALE[11]*2];
        const freq = arpNotes[arpIdx % arpNotes.length];
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.connect(g); g.connect(masterGain);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, ac.currentTime);
        g.gain.setValueAtTime(0.22, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.1);
        osc.start(ac.currentTime); osc.stop(ac.currentTime+0.11);
        arpIdx++;
        arpTimer = setTimeout(playArpNote, 118);
    } catch(e) { arpTimer = setTimeout(playArpNote, 118); }
}

function playPulse() {
    if (!musicPlaying || !masterGain) return;
    try {
        const ac = getAudioCtx();
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.connect(g); g.connect(masterGain);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(62, ac.currentTime);
        g.gain.setValueAtTime(0.35, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.16);
        osc.start(ac.currentTime); osc.stop(ac.currentTime+0.17);
        pulseTimer = setTimeout(playPulse, 500);
    } catch(e) { pulseTimer = setTimeout(playPulse, 500); }
}

document.addEventListener("keydown", e => {
    try { if (audioCtx && audioCtx.state === "suspended") audioCtx.resume(); } catch(e2) {}
    keys[e.key.toLowerCase()] = true;
    if (e.key === " " && gameState === "playing") { bullets.push(new Bullet(player.x + player.width/2, player.y - 10, "#00bbff", -12)); playSound("shoot"); }
    if (e.key === " " && gameState === "start") startCountdown();
});
document.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener("click", () => {
    try { if (audioCtx && audioCtx.state === "suspended") audioCtx.resume(); } catch(e2) {}
    if (gameState === "start") startCountdown();
    if (gameState === "playing") { bullets.push(new Bullet(player.x + player.width/2, player.y - 10, "#00bbff", -12)); playSound("shoot"); }
});

// ── Star ─────────────────────────────────────────────────────
class Star {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speed = Math.random() * 1 + 0.5;
        this.opacity = Math.random() * 0.7 + 0.3;
    }
    update() {
        this.y += this.speed;
        if (this.y > canvas.height) { this.y = 0; this.x = Math.random() * canvas.width; }
        this.draw();
    }
    draw() {
        ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }
}

// ── Player — Viper ────────────────────────────────────────────
class Player {
    constructor() {
        this.width = 72; this.height = 88;
        this.x = canvas.width/2 - this.width/2;
        this.y = canvas.height - 150;
        this.speed = 18; this.thrustFrame = 0;
    }
    update() {
        if (keys["arrowleft"]  || keys["a"]) this.x -= this.speed;
        if (keys["arrowright"] || keys["d"]) this.x += this.speed;
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
        this.thrustFrame += 0.25;
        this.draw();
    }
    draw() {
        const x = this.x, y = this.y, cx = x + this.width/2;
        ctx.save();
        const thrustLen = 22 + Math.sin(this.thrustFrame) * 10;
        const thrustAlpha = 0.7 + Math.sin(this.thrustFrame) * 0.3;
        ctx.shadowColor = "#00aaff"; ctx.shadowBlur = 18;
        ctx.fillStyle = `rgba(0,180,255,${thrustAlpha})`;
        ctx.beginPath(); ctx.moveTo(cx-22, y+this.height-2); ctx.lineTo(cx-15, y+this.height+thrustLen); ctx.lineTo(cx-8, y+this.height-2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx+8, y+this.height-2); ctx.lineTo(cx+15, y+this.height+thrustLen); ctx.lineTo(cx+22, y+this.height-2); ctx.fill();
        ctx.fillStyle = `rgba(180,240,255,${thrustAlpha*0.8})`;
        ctx.beginPath(); ctx.moveTo(cx-18, y+this.height); ctx.lineTo(cx-15, y+this.height+thrustLen*0.6); ctx.lineTo(cx-12, y+this.height); ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx+12, y+this.height); ctx.lineTo(cx+15, y+this.height+thrustLen*0.6); ctx.lineTo(cx+18, y+this.height); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#4a7090"; ctx.strokeStyle = "#88ccff"; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(cx-4, y+30); ctx.lineTo(x, y+55); ctx.lineTo(x-20, y+72); ctx.lineTo(x-8, y+this.height); ctx.lineTo(cx-20, y+this.height); ctx.lineTo(cx-8, y+50); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx+4, y+30); ctx.lineTo(x+this.width, y+55); ctx.lineTo(x+this.width+20, y+72); ctx.lineTo(x+this.width+8, y+this.height); ctx.lineTo(cx+20, y+this.height); ctx.lineTo(cx+8, y+50); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "rgba(136,204,255,0.15)";
        ctx.beginPath(); ctx.moveTo(cx-4, y+30); ctx.lineTo(x, y+55); ctx.lineTo(cx-8, y+50); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx+4, y+30); ctx.lineTo(x+this.width, y+55); ctx.lineTo(cx+8, y+50); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#223344"; ctx.strokeStyle = "#4499bb"; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.roundRect(cx-26, y+58, 18, 32, 4); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.roundRect(cx+8, y+58, 18, 32, 4); ctx.fill(); ctx.stroke();
        ctx.shadowColor = "#00aaff"; ctx.shadowBlur = 10; ctx.fillStyle = "#00ccff";
        ctx.beginPath(); ctx.ellipse(cx-17, y+62, 5, 3, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx+17, y+62, 5, 3, 0, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#6688aa"; ctx.strokeStyle = "#aaccee"; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(cx, y+2); ctx.lineTo(cx-10, y+22); ctx.lineTo(cx-14, y+55); ctx.lineTo(cx-8, y+this.height-4); ctx.lineTo(cx, y+this.height-2); ctx.lineTo(cx+8, y+this.height-4); ctx.lineTo(cx+14, y+55); ctx.lineTo(cx+10, y+22); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = "rgba(180,220,255,0.3)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx, y+2); ctx.lineTo(cx, y+this.height-2); ctx.stroke();
        ctx.shadowColor = "#00eeff"; ctx.shadowBlur = 14;
        ctx.fillStyle = "#112233"; ctx.strokeStyle = "#44aacc"; ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.ellipse(cx, y+24, 9, 16, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#00ccee";
        ctx.beginPath(); ctx.ellipse(cx, y+23, 6, 11, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "rgba(200,240,255,0.6)";
        ctx.beginPath(); ctx.ellipse(cx-2, y+19, 2.5, 5, -0.3, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        const blink = Math.sin(this.thrustFrame*2) > 0;
        ctx.fillStyle = blink ? "#ff4444" : "#441111";
        ctx.shadowColor = "#ff0000"; ctx.shadowBlur = blink ? 8 : 0;
        ctx.beginPath(); ctx.arc(x-18, y+72, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x+this.width+18, y+72, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(100,160,200,0.25)"; ctx.lineWidth = 0.6;
        ctx.beginPath(); ctx.moveTo(cx-6, y+35); ctx.lineTo(cx-12, y+55); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx+6, y+35); ctx.lineTo(cx+12, y+55); ctx.stroke();
        ctx.restore();
    }
}

// ── Bullet ───────────────────────────────────────────────────
class Bullet {
    constructor(x, y, color, speedY) {
        this.x = x; this.y = y; this.color = color;
        this.speedY = speedY; this.speedX = 0; this.radius = 4;
    }
    update() { this.y += this.speedY; this.x += this.speedX; this.draw(); }
    draw() {
        ctx.shadowColor = this.color; ctx.shadowBlur = 20;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// ── Asteroid ─────────────────────────────────────────────────
class Asteroid {
    constructor() {
        this.size = Math.random() * 50 + 30;
        this.x = Math.random() * (canvas.width - this.size);
        this.y = -this.size;
        this.speed = Math.random() * 2 + 2 + level * 0.3;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.03;
        const roll = Math.random();
        this.type = roll < 0.6 ? "rocky" : roll < 0.8 ? "icy" : "metallic";
        if (this.type === "rocky") {
            this.fillColor = "#7a5c3a"; this.strokeColor = "#c8954a";
            this.darkColor = "#4a3020"; this.deepColor = "#2e1e10"; this.glowColor = "#ff8800";
        } else if (this.type === "icy") {
            this.fillColor = "#2a4a6a"; this.strokeColor = "#88ccff";
            this.darkColor = "#162535"; this.deepColor = "#0e1d2a"; this.glowColor = "#44aaff";
        } else {
            this.fillColor = "#5a5a6a"; this.strokeColor = "#c0c0d8";
            this.darkColor = "#363640"; this.deepColor = "#282830"; this.glowColor = "#aaaacc";
        }
        this.points = [];
        for (let i = 0; i < 12; i++) {
            const angle = (Math.PI*2/12)*i;
            const variance = this.type === "metallic" ? 6 : 12;
            const r = this.size/2 + (Math.random()*variance - variance/2);
            this.points.push({ x: Math.cos(angle)*r, y: Math.sin(angle)*r });
        }
        this.craters = [];
        for (let i = 0; i < Math.floor(Math.random()*2)+2; i++) {
            this.craters.push({
                x: (Math.random()-0.5)*(this.size*0.55), y: (Math.random()-0.5)*(this.size*0.55),
                rx: Math.random()*7+4, ry: Math.random()*5+3, angle: Math.random()*Math.PI
            });
        }
        this.ridges = [];
        for (let i = 0; i < Math.floor(Math.random()*2)+2; i++) {
            const r = this.size*0.35;
            this.ridges.push({
                x1:(Math.random()-0.5)*r, y1:(Math.random()-0.5)*r,
                x2:(Math.random()-0.5)*r, y2:(Math.random()-0.5)*r,
                cpx:(Math.random()-0.5)*r, cpy:(Math.random()-0.5)*r
            });
        }
        this.highlightAngle = Math.random()*Math.PI*2;
        this.highlightDist  = this.size*0.22;
    }
    update() { this.y += this.speed; this.rotation += this.rotationSpeed; this.draw(); }
    draw() {
        ctx.save();
        ctx.translate(this.x+this.size/2, this.y+this.size/2);
        ctx.rotate(this.rotation);
        ctx.shadowColor = this.glowColor; ctx.shadowBlur = 8;
        ctx.fillStyle = this.fillColor; ctx.strokeStyle = this.strokeColor; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y);
        for (let p of this.points) ctx.lineTo(p.x, p.y);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = this.strokeColor; ctx.lineWidth = 0.8; ctx.globalAlpha = 0.5;
        for (let r of this.ridges) {
            ctx.beginPath(); ctx.moveTo(r.x1, r.y1); ctx.quadraticCurveTo(r.cpx, r.cpy, r.x2, r.y2); ctx.stroke();
        }
        ctx.globalAlpha = 1;
        for (let c of this.craters) {
            ctx.fillStyle = this.darkColor; ctx.strokeStyle = this.strokeColor; ctx.lineWidth = 0.7;
            ctx.beginPath(); ctx.ellipse(c.x, c.y, c.rx, c.ry, c.angle, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = this.deepColor;
            ctx.beginPath(); ctx.ellipse(c.x+c.rx*0.1, c.y+c.ry*0.1, c.rx*0.6, c.ry*0.6, c.angle, 0, Math.PI*2); ctx.fill();
            if (this.type === "metallic") {
                ctx.fillStyle = "rgba(200,200,220,0.25)";
                ctx.beginPath(); ctx.ellipse(c.x-c.rx*0.3, c.y-c.ry*0.3, c.rx*0.25, c.ry*0.2, c.angle, 0, Math.PI*2); ctx.fill();
            }
        }
        if (this.type === "icy") {
            ctx.strokeStyle = "rgba(150,220,255,0.6)"; ctx.lineWidth = 0.7;
            for (let r of this.ridges) { ctx.beginPath(); ctx.moveTo(r.x1, r.y1); ctx.lineTo(r.cpx, r.cpy); ctx.lineTo(r.x2, r.y2); ctx.stroke(); }
        }
        if (this.type === "metallic") {
            ctx.strokeStyle = "rgba(180,180,210,0.2)"; ctx.lineWidth = 0.5;
            for (let r of this.ridges) { ctx.beginPath(); ctx.moveTo(r.x1*0.8, r.y1*0.8); ctx.lineTo(r.x2*0.8, r.y2*0.8); ctx.stroke(); }
        }
        const hx = Math.cos(this.highlightAngle)*this.highlightDist;
        const hy = Math.sin(this.highlightAngle)*this.highlightDist;
        const highlightColor = this.type==="rocky" ? "rgba(210,160,90,0.13)" : this.type==="icy" ? "rgba(150,210,255,0.15)" : "rgba(220,220,240,0.16)";
        ctx.fillStyle = highlightColor;
        ctx.beginPath(); ctx.ellipse(hx, hy, this.size*0.38, this.size*0.25, this.highlightAngle, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

// ── UFO ──────────────────────────────────────────────────────
class UFO {
    constructor() {
        this.type = Math.random() < 0.6 ? "green" : "red";
        this.points = this.type === "green" ? 50 : 100;
        this.color = this.type === "green" ? "#00ff88" : "#ff4444";
        this.glowColor = this.type === "green" ? "#00ff88" : "#ff0000";
        this.width = this.type === "green" ? 70 : 55;
        this.height = this.type === "green" ? 30 : 24;
        this.fromLeft = Math.random() < 0.5;
        this.x = this.fromLeft ? -this.width : canvas.width;
        this.y = Math.random()*(canvas.height*0.5)+80;
        const baseSpeed = this.type === "green" ? 1.8 : 3.2;
        this.speedX = this.fromLeft ? baseSpeed : -baseSpeed;
        this.speedY = (Math.random()-0.5)*0.8;
        this.pulse = Math.random()*Math.PI*2;
        this.shootTimer = 0;
        this.shootInterval = this.type === "green" ? 120 : 70;
    }
    update() {
        this.x += this.speedX; this.y += this.speedY; this.pulse += 0.08;
        this.shootTimer++;
        if (this.shootTimer >= this.shootInterval && gameRunning) {
            this.shootTimer = 0;
            const dx = (player.x+player.width/2)-(this.x+this.width/2);
            const dy = (player.y+player.height/2)-(this.y+this.height/2);
            const dist = Math.sqrt(dx*dx+dy*dy);
            const spd = this.type==="green" ? 4 : 6;
            const eb = new Bullet(this.x+this.width/2, this.y+this.height, this.glowColor, spd*(dy/dist));
            eb.speedX = spd*(dx/dist)*0.4;
            enemyBullets.push(eb);
            playSound("ufoShoot");
        }
        this.draw();
    }
    draw() {
        const cx = this.x+this.width/2, cy = this.y+this.height/2;
        ctx.save();
        ctx.shadowColor = this.glowColor; ctx.shadowBlur = 18+Math.sin(this.pulse)*8;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.ellipse(cx, cy+4, this.width/2, this.height/2-4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = this.type==="green" ? "rgba(0,255,136,0.5)" : "rgba(255,68,68,0.5)";
        ctx.beginPath(); ctx.ellipse(cx, cy-4, this.width/4, this.height/2, 0, Math.PI, Math.PI*2); ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.beginPath(); ctx.ellipse(cx-4, cy-6, this.width/10, this.height/5, -0.3, Math.PI, Math.PI*2); ctx.fill();
        for (let i = 0; i < 3; i++) {
            const lx = cx-14+i*14;
            ctx.fillStyle = Math.sin(this.pulse+i*1.2)>0 ? "#ffffff" : "rgba(0,0,0,0.5)";
            ctx.beginPath(); ctx.arc(lx, cy+8, 3, 0, Math.PI*2); ctx.fill();
        }
        ctx.shadowBlur = 0;
        ctx.fillStyle = this.color; ctx.font = "bold 11px 'Courier New'"; ctx.textAlign = "center";
        ctx.fillText(this.points+" PTS", cx, this.y-6);
        ctx.restore();
    }
    isOffScreen() { return this.x > canvas.width+this.width || this.x < -this.width*2; }
}

// ── Explosion Particle ───────────────────────────────────────
class ExplosionParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color||"255,140,0";
        this.radius = Math.random()*5+2;
        this.speedX = (Math.random()-0.5)*12;
        this.speedY = (Math.random()-0.5)*12;
        this.life = 50;
    }
    update() {
        this.x += this.speedX; this.y += this.speedY;
        this.speedX *= 0.95; this.speedY *= 0.95;
        this.life--; this.draw();
    }
    draw() {
        ctx.fillStyle = `rgba(${this.color},${this.life/50})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
    }
}

// ── Ship Fragment — for player death explosion ────────────────
class ShipFragment {
    constructor(x, y, points, color, strokeColor) {
        this.x = x; this.y = y;
        this.points = points;
        this.color = color;
        this.strokeColor = strokeColor;
        this.speedX = (Math.random()-0.5) * 8;
        this.speedY = (Math.random()-0.5) * 8 - 2;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random()-0.5) * 0.18;
        this.life = 80;
        this.gravity = 0.08;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.rotation += this.rotSpeed;
        this.life--;
        this.draw();
    }
    draw() {
        if (this.life <= 0) return;
        const alpha = this.life / 80;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;
        ctx.strokeStyle = this.strokeColor;
        ctx.lineWidth = 0.8;
        ctx.shadowColor = "#00aaff";
        ctx.shadowBlur = 8 * alpha;
        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y);
        for (let p of this.points) ctx.lineTo(p.x, p.y);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
    }
}

// ── Shockwave ring ────────────────────────────────────────────
class Shockwave {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius = 10;
        this.maxRadius = 120;
        this.life = 40;
    }
    update() {
        this.radius += (this.maxRadius - this.radius) * 0.12;
        this.life--;
        this.draw();
    }
    draw() {
        const alpha = this.life / 40;
        ctx.save();
        ctx.globalAlpha = alpha * 0.7;
        ctx.strokeStyle = "#00ccff";
        ctx.lineWidth = 3 * alpha;
        ctx.shadowColor = "#00aaff";
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.stroke();
        // Second inner ring
        ctx.globalAlpha = alpha * 0.4;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 1.5 * alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
    }
}

// ── Trigger player death explosion ───────────────────────────
function triggerPlayerExplosion(px, py) {
    const cx = px + 36, cy = py + 44; // ship center

    // Shockwave rings
    shockwaves.push(new Shockwave(cx, cy));
    setTimeout(() => shockwaves.push(new Shockwave(cx, cy)), 150);

    // Blue engine particles
    for (let i = 0; i < 35; i++) particles.push(new ExplosionParticle(cx, cy, "0,180,255"));
    // Orange fire particles
    for (let i = 0; i < 30; i++) particles.push(new ExplosionParticle(cx, cy, "255,140,0"));
    // White core flash particles
    for (let i = 0; i < 15; i++) particles.push(new ExplosionParticle(cx, cy, "220,240,255"));

    // Ship fragments — nose piece
    shipFragments.push(new ShipFragment(cx, cy-20, [
        {x:0,y:-22}, {x:-8,y:0}, {x:8,y:0}
    ], "#6688aa", "#aaccee"));

    // Left wing fragment
    shipFragments.push(new ShipFragment(cx-20, cy+10, [
        {x:0,y:-15}, {x:-22,y:8}, {x:-8,y:12}, {x:4,y:0}
    ], "#4a7090", "#88ccff"));

    // Right wing fragment
    shipFragments.push(new ShipFragment(cx+20, cy+10, [
        {x:0,y:-15}, {x:22,y:8}, {x:8,y:12}, {x:-4,y:0}
    ], "#4a7090", "#88ccff"));

    // Left nacelle fragment
    shipFragments.push(new ShipFragment(cx-17, cy+25, [
        {x:-7,y:-12}, {x:7,y:-12}, {x:7,y:12}, {x:-7,y:12}
    ], "#223344", "#4499bb"));

    // Right nacelle fragment
    shipFragments.push(new ShipFragment(cx+17, cy+25, [
        {x:-7,y:-12}, {x:7,y:-12}, {x:7,y:12}, {x:-7,y:12}
    ], "#223344", "#4499bb"));

    // Cockpit fragment
    shipFragments.push(new ShipFragment(cx, cy-5, [
        {x:-6,y:-10}, {x:6,y:-10}, {x:6,y:10}, {x:-6,y:10}
    ], "#00ccee", "#00eeff"));

    // Fuselage center chunk
    shipFragments.push(new ShipFragment(cx, cy+15, [
        {x:-10,y:-8}, {x:10,y:-8}, {x:8,y:10}, {x:-8,y:10}
    ], "#6688aa", "#aaccee"));
}

function showScorePopup(x, y, pts, color) {
    const el = document.createElement("div");
    el.className = "scorePopup";
    el.style.cssText = `left:${x}px;top:${y}px;color:${color};text-shadow:0 0 8px ${color};`;
    el.innerText = "+"+pts;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

// ── Game objects ─────────────────────────────────────────────
let player, bullets, enemyBullets, asteroids, ufos, particles, shipFragments, shockwaves;
const stars = [];
for (let i = 0; i < 150; i++) stars.push(new Star());

function initGameObjects() {
    player = new Player();
    bullets = []; enemyBullets = []; asteroids = []; ufos = [];
    particles = []; shipFragments = []; shockwaves = [];
    score = 0; level = 1; playerLives = 5; milestoneAwarded = [];
    enemySpawnRate = 1200; gameRunning = false; ufoSpawnTimer = 0;
}
initGameObjects();

function updateUI() {
    scoreEl.innerText = score; livesEl.innerText = playerLives;
    levelEl.innerText = level; hiScoreDisplay.innerText = hiScore;
}

function spawnAsteroid() {
    if (!gameRunning) return;
    asteroids.push(new Asteroid());
    setTimeout(spawnAsteroid, enemySpawnRate);
}

function createExplosion(x, y, color, count) {
    for (let i = 0; i < (count||25); i++) particles.push(new ExplosionParticle(x, y, color));
}

function checkBulletAsteroid(b, a) {
    const cx = a.x+a.size/2, cy = a.y+a.size/2;
    const dx = b.x-cx, dy = b.y-cy;
    return Math.sqrt(dx*dx+dy*dy) < a.size/2+b.radius;
}

function checkBulletUFO(b, u) {
    const cx = u.x+u.width/2, cy = u.y+u.height/2;
    const dx = b.x-cx, dy = b.y-cy;
    return Math.sqrt(dx*dx+dy*dy) < u.width/2-4+b.radius;
}

function increaseDifficulty() {
    level++;
    if (enemySpawnRate > 300) enemySpawnRate -= 100;
    playSound("levelUp");
    updateUI();
}

// ── End game with explosion then show game over ───────────────
function endGame() {
    gameRunning = false;
    gameState = "exploding";
    stopMusic();
    hudLeftEl.style.display = hudTopEl.style.display = controlsEl.style.display = document.getElementById("muteBtn").style.display = "none";

    // Trigger the ship explosion
    triggerPlayerExplosion(player.x, player.y);
    playSound("playerExplode");

    // Let the explosion play out then show game over
    setTimeout(() => {
        gameState = "over";
        if (score > hiScore) { hiScore = score; hiScoreMsgEl.innerText = "★ NEW HI-SCORE! ★"; }
        else hiScoreMsgEl.innerText = "HI-SCORE: "+hiScore;
        gameOverEl.style.display = "block";
        finalScoreEl.innerText = "SCORE: "+score;
    }, 1800);

    // Keep animating fragments and particles
    animateExplosion();
}

// ── Explosion-only animation loop ─────────────────────────────
function animateExplosion() {
    if (gameState !== "exploding") return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => s.update());

    // Keep drawing remaining asteroids and UFOs for context
    asteroids.forEach(a => a.draw());
    ufos.forEach(u => u.draw());

    // Shockwaves
    for (let i = shockwaves.length-1; i >= 0; i--) {
        shockwaves[i].update();
        if (shockwaves[i].life <= 0) shockwaves.splice(i,1);
    }

    // Particles
    for (let i = particles.length-1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) particles.splice(i,1);
    }

    // Ship fragments tumbling away
    for (let i = shipFragments.length-1; i >= 0; i--) {
        shipFragments[i].update();
        if (shipFragments[i].life <= 0) shipFragments.splice(i,1);
    }

    animFrameId = requestAnimationFrame(animateExplosion);
}

// ── Start screen ─────────────────────────────────────────────
let titleBlink = true, blinkTimer = 0, titlePulse = 0;

function drawStartScreen() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => s.update());
    const cx = canvas.width/2, cy = canvas.height/2;
    titlePulse += 0.03; blinkTimer++;
    if (blinkTimer % 40 === 0) titleBlink = !titleBlink;
    ctx.fillStyle = "rgba(0,0,0,0.45)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ffcc00"; ctx.shadowColor = "#ffcc00"; ctx.shadowBlur = 12;
    ctx.font = "bold 14px 'Courier New'"; ctx.textAlign = "center";
    ctx.fillText("HI-SCORE", cx, 50);
    ctx.font = "bold 24px 'Courier New'"; ctx.fillText(hiScore, cx, 78);
    ctx.shadowBlur = 0;
    ctx.shadowColor = "#ffcc00"; ctx.shadowBlur = 30+Math.sin(titlePulse)*15;
    ctx.font = `bold ${Math.min(canvas.width*0.095,90)}px 'Courier New'`;
    ctx.fillStyle = "#ffcc00"; ctx.textAlign = "center";
    ctx.fillText("ASTEROID", cx, cy-60);
    ctx.shadowColor = "#ff4400"; ctx.shadowBlur = 30+Math.sin(titlePulse)*15;
    ctx.fillStyle = "#ff4400"; ctx.fillText("ASSAULT", cx, cy+20);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "rgba(255,200,0,0.4)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx-180, cy+44); ctx.lineTo(cx+180, cy+44); ctx.stroke();
    ctx.font = "13px 'Courier New'"; ctx.fillStyle = "#888";
    ctx.fillText("★  DEFEND THE GALAXY  ★", cx, cy+68);
    if (titleBlink) {
        ctx.font = "bold 18px 'Courier New'"; ctx.fillStyle = "#ffffff";
        ctx.shadowColor = "#ffffff"; ctx.shadowBlur = 10;
        ctx.fillText("— PRESS SPACE TO START —", cx, cy+110);
        ctx.shadowBlur = 0;
    }
    ctx.font = "12px 'Courier New'"; ctx.fillStyle = "#888888";
    ctx.fillText("🪨 ASTEROID  10 PTS     🟢 GREEN UFO  50 PTS     🔴 RED UFO  100 PTS", cx, cy+155);
    ctx.font = "12px 'Courier New'"; ctx.fillStyle = "#444";
    ctx.fillText("⬅ ➡  MOVE     SPACE  SHOOT", cx, canvas.height-40);
    ctx.font = "11px 'Courier New'"; ctx.fillStyle = "#333";
    ctx.fillText("© 2026 DENNY'S ARCADE  •  DENNYS-ARCADE.COM", cx, canvas.height-20);
    if (gameState === "start") animFrameId = requestAnimationFrame(drawStartScreen);
}

function startCountdown() {
    if (gameState !== "start") return;
    gameState = "countdown";
    cancelAnimationFrame(animFrameId);
    initGameObjects();
    let count = 3;
    countdownEl.style.display = "block";
    countdownEl.innerText = count;
    const tick = setInterval(() => {
        count--;
        if (count > 0) {
            countdownEl.innerText = count;
            countdownEl.style.animation = "none";
            void countdownEl.offsetWidth;
            countdownEl.style.animation = "popIn 0.3s ease-out";
        } else {
            clearInterval(tick);
            countdownEl.innerText = "GO!";
            countdownEl.style.animation = "none";
            void countdownEl.offsetWidth;
            countdownEl.style.animation = "popIn 0.3s ease-out";
            setTimeout(() => { countdownEl.style.display = "none"; startGame(); }, 600);
        }
    }, 800);
}

function startGame() {
    gameState = "playing"; gameRunning = true;
    startMusic();
    hudLeftEl.style.display = hudTopEl.style.display = controlsEl.style.display = document.getElementById("muteBtn").style.display = "block";
    updateUI(); spawnAsteroid(); animate();
}

function showStartScreen() {
    gameOverEl.style.display = "none";
    hudLeftEl.style.display = hudTopEl.style.display = controlsEl.style.display = document.getElementById("muteBtn").style.display = "none";
    gameState = "start"; initGameObjects(); drawStartScreen();
}

// ── Main loop ─────────────────────────────────────────────────
function animate() {
    if (!gameRunning) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => s.update());
    player.update();
    ufoSpawnTimer++;
    if (ufoSpawnTimer >= UFO_SPAWN_INTERVAL) { ufoSpawnTimer = 0; ufos.push(new UFO()); }

    for (let i = bullets.length-1; i >= 0; i--) {
        bullets[i].update();
        if (bullets[i].y < 0) bullets.splice(i,1);
    }

    for (let i = enemyBullets.length-1; i >= 0; i--) {
        enemyBullets[i].update();
        const eb = enemyBullets[i];
        if (!eb || eb.y > canvas.height || eb.y < 0) { enemyBullets.splice(i,1); continue; }
        if (eb.x > player.x && eb.x < player.x+player.width && eb.y > player.y && eb.y < player.y+player.height) {
            createExplosion(eb.x, eb.y, "255,80,80", 15);
            enemyBullets.splice(i,1);
            playerLives--; updateUI();
            if (playerLives <= 0) { endGame(); return; }
        }
    }

    for (let u = ufos.length-1; u >= 0; u--) {
        const ufo = ufos[u];
        ufo.update();
        if (ufo.isOffScreen()) { ufos.splice(u,1); continue; }
        let ufoHit = false;
        for (let b = bullets.length-1; b >= 0; b--) {
            if (checkBulletUFO(bullets[b], ufo)) {
                createExplosion(ufo.x+ufo.width/2, ufo.y+ufo.height/2, ufo.type==="green"?"0,255,136":"255,60,60", 40);
                playSound("ufoExplode");
                showScorePopup(ufo.x+ufo.width/2, ufo.y, ufo.points, ufo.color);
                score += ufo.points;
                if (score > hiScore) hiScore = score;
                if (score % 100 === 0) increaseDifficulty();
                checkLifeMilestones();
                updateUI(); bullets.splice(b,1); ufos.splice(u,1); ufoHit = true; break;
            }
        }
        if (ufoHit) continue;
        if (ufo.x < player.x+player.width && ufo.x+ufo.width > player.x && ufo.y < player.y+player.height && ufo.y+ufo.height > player.y) { endGame(); return; }
    }

    for (let a = asteroids.length-1; a >= 0; a--) {
        const asteroid = asteroids[a];
        asteroid.update();
        if (asteroid.y > canvas.height) {
            asteroids.splice(a,1);
            continue;
        }
        let hit = false;
        for (let b = bullets.length-1; b >= 0; b--) {
            if (checkBulletAsteroid(bullets[b], asteroid)) {
                const exColor = asteroid.type==="icy" ? "80,180,255" : asteroid.type==="metallic" ? "180,180,220" : "255,140,0";
                createExplosion(asteroid.x+asteroid.size/2, asteroid.y+asteroid.size/2, exColor, 25);
                playSound("asteroidExplode");
                asteroids.splice(a,1); bullets.splice(b,1);
                score += 10;
                if (score > hiScore) hiScore = score;
                if (score % 100 === 0) increaseDifficulty();
                checkLifeMilestones();
                updateUI(); hit = true; break;
            }
        }
        if (hit) continue;
        if (asteroid.x < player.x+player.width && asteroid.x+asteroid.size > player.x && asteroid.y < player.y+player.height && asteroid.y+asteroid.size > player.y) { endGame(); return; }
    }

    for (let p = particles.length-1; p >= 0; p--) {
        particles[p].update();
        if (particles[p].life <= 0) particles.splice(p,1);
    }

    animFrameId = requestAnimationFrame(animate);
}

updateUI();
drawStartScreen();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
